services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1434:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  mssql_data: